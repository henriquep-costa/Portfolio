<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marília's library</title>
    <style>
      form div {
        margin-bottom: 10px;
      }
      label {
        display: block;
      }
    </style>
  </head>
  <body>
    <h1>Marília's library</h1>

    <form method="POST" action="/add">
      <div>
        <label>Nome do livro:</label>
        <input name="titulo" placeholder="Digite o nome do livro" required />
      </div>

      <div>
        <label>Autor:</label>
        <input name="autor" placeholder="Digite o autor" required />
      </div>

      <button type="submit">Adicionar</button>
    </form>

    <ul>
      {% for livro in livros %}
      <li>{{ livro.titulo }} - {{ livro.autor }}</li>
      {% endfor %}
    </ul>
  </body>
</html>
